<!doctype html>
<html lang="en" data-theme="corporate">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ page.title | default: site.title }}</title>
        <meta name="description" content="{{ site.description }}" />

        <!-- Tailwind v4 + DaisyUI 5 (browser CDN) -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script
            type="text/javascript"
            src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
            data-name="bmc-button"
            data-slug="litlabsau"
            data-color="#40DCA5"
            data-emoji="🔌"
            data-font="Cookie"
            data-text="Charge My Laptop"
            data-outline-color="#000000"
            data-font-color="#ffffff"
            data-coffee-color="#FFDD00"
        ></script>
    </head>
    <body class="min-h-screen bg-base-200">
        <header class="navbar bg-base-100 shadow-sm px-6">
            <div class="flex-1 flex-col items-start">
                <span class="text-xl font-bold">{{ site.title }}</span>
                <span class="text-sm opacity-70">{{ site.description }}</span>
            </div>
            <a href="https://www.buymeacoffee.com/litlabsau" target="_blank"
                ><img
                    src="https://cdn.buymeacoffee.com/buttons/v2/default-green.png"
                    alt="Buy Me a Coffee"
                    style="height: 60px !important; width: 217px !important"
            /></a>

            <a
                class="btn btn-ghost"
                href="https://github.com/{{ site.github_username }}/macos-icons"
                >GitHub</a
            >
        </header>

        <main class="max-w-6xl mx-auto p-6">{{ content }}</main>

        <footer class="footer footer-center p-6 text-base-content/70">
            <p>
                Maintained by
                <a
                    class="link"
                    href="https://github.com/{{ site.github_username }}"
                    >{{ site.github_username }}</a
                >
            </p>
        </footer>
        <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
        <script
            type="text/javascript"
            src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
            data-name="bmc-button"
            data-slug="litlabsau"
            data-color="#40DCA5"
            data-emoji="🔌"
            data-font="Cookie"
            data-text="Charge My Laptop"
            data-outline-color="#000000"
            data-font-color="#ffffff"
            data-coffee-color="#FFDD00"
        ></script>
        <a href="https://www.buymeacoffee.com/litlabsau" target="_blank"
            ><img
                src="https://cdn.buymeacoffee.com/buttons/v2/default-green.png"
                alt="Buy Me a Coffee"
                style="height: 60px !important; width: 217px !important"
        /></a>
    </body>
</html>
