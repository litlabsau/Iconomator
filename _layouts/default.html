<!doctype html>
<html lang="en" data-theme="corporate">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{{ page.title | default: site.title }}</title>
        <meta name="description" content="{{ site.description }}" />

        <!-- Tailwind v4 + DaisyUI 5 (browser CDN) -->
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5"
            rel="stylesheet"
            type="text/css"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
            rel="stylesheet"
            type="text/css"
        />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="min-h-screen bg-base-200">
        <header class="navbar bg-base-100 shadow-sm px-6">
            <div class="flex-1 flex-col items-start">
                <span class="text-xl font-bold">{{ site.title }}</span>
                <span class="text-sm opacity-70">{{ site.description }}</span>
            </div>
            <div class="flex items-center gap-2">
                <a
                    class="btn btn-sm btn-success"
                    href="https://www.buymeacoffee.com/litlabsau"
                    target="_blank"
                    rel="noopener"
                    >⚡️ Charge My Laptop</a
                >
                <a
                class="btn btn-sm btn-ghost gap-1"
                href="https://github.com/{{ site.github_username }}/macos-icons">
                GitHub
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14.7974 14.419"
                     width="8" height="8" fill="currentColor" aria-hidden="true">
                    <path d="M0.27467 14.148C0.635999 14.4996 1.13405 14.5191 1.50514 14.148L11.4172 4.24565L13.4094 2.09722C13.7415 1.76519 13.7415 1.32573 13.4192 1.01323C13.0969 0.690967 12.6477 0.681202 12.3255 1.01323L10.177 3.00542L0.27467 12.9175C-0.0964233 13.2886-0.0866577 13.7867 0.27467 14.148ZM12.6575 7.2144L12.6575 10.8179C12.6575 11.2867 13.0676 11.7066 13.5462 11.7066C14.0149 11.7066 14.4348 11.316 14.4348 10.7789L14.4251 0.964405C14.4251 0.397999 14.054 0.0171393 13.4778 0.0171393L3.65358 0.0171393C3.1067 0.0171393 2.73561 0.427296 2.73561 0.896046C2.73561 1.3648 3.15553 1.76519 3.61451 1.76519L7.01295 1.76519L12.8919 1.56987Z"/>
                </svg>
                </a>

        </header>

        <main class="max-w-6xl mx-auto p-6">{{ content }}</main>

        <footer class="footer footer-center p-6 text-base-content/70">
            <p>
                Maintained by
                <a
                    class="link"
                    href="https://github.com/{{ site.github_username }}"
                    >{{ site.github_username }}</a
                >
            </p>
        </footer>
        <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
    </body>
</html>
